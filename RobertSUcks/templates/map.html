<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NutriLog • Map</title>

  <!-- Keep your global styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <!-- Map-only styles (NEW) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='map.css') }}">
</head>

<body>
  <!-- Simple header (doesn't change your teammate's pages) -->
  <header class="map-topbar">
    <div class="map-brand">
      <span class="map-brandname">NutriLog</span>
      <span class="map-tag">Student Map</span>
    </div>

    <div class="map-meta">
      <div class="map-pill">
        <div class="map-pill-label">Role</div>
        <div class="map-pill-value">{{ role }}</div>
      </div>
      <div class="map-pill">
        <div class="map-pill-label">User ID</div>
        <div class="map-pill-value">{{ user_id }}</div>
      </div>
      <div class="map-pill">
        <div class="map-pill-label">Initials</div>
        <div class="map-pill-value">{{ initials }}</div>
      </div>
    </div>
  </header>

  <main class="map-page">
    <section class="map-hero">
      <div>
        <h1 class="map-title">My Location</h1>
        <p class="map-subtitle">
          This page updates your latest location into the Activity Log.
        </p>
      </div>

      <button class="map-btn" type="button" onclick="window.location.reload()">
        Refresh
      </button>
    </section>

    <section class="map-card">
      <div class="map-cardhead">
        <div class="map-status">
          <span class="map-dot" aria-hidden="true"></span>
          <p id="status" class="map-statustext">Requesting your location...</p>
        </div>
      </div>

      <!-- KEEP this ID for Google Maps -->
      <div id="map" class="map-canvas"></div>
    </section>
  </main>

  <script>
    const USER_INITIALS = "{{ initials }}";
  </script>

  <!-- Keep your existing student map JS file name if different -->
  <script src="{{ url_for('static', filename='js/student_map.js') }}"></script>

  <!-- Keep your existing Google Maps script tag (use your real key) -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_REAL_KEY&v=weekly"
  async defer>
</script>
</body>
</html>
